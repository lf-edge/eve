org: lfedge
image: eve-pillar
config:
  binds:
    - /lib/modules:/lib/modules
    - /dev:/dev
    - /etc/resolv.conf:/etc/resolv.conf
    - /etc/cdi:/etc/cdi
    - /run:/run
    - /config:/config
    - /:/hostfs
    - /persist:/persist:rshared,rbind
    - /usr/bin/containerd:/usr/bin/containerd
    - /opt/vendor:/opt/vendor:ro
    # Expose host firmware for Wi-Fi drivers that defer firmware loading
    # until first interface use, from within the container context.
    - /lib/firmware:/lib/firmware
    # Intel RDT: resctrl filesystem for cache/bandwidth allocation
    - /sys/fs/resctrl:/sys/fs/resctrl:rshared,rbind,rw
    # Intel RDT: sysfs device topology for pqos capability detection
    - /sys/devices:/sys/devices:rshared,rbind,rw
  net: host
  capabilities:
    - all
  pid: host
  rootfsPropagation: shared
  devices:
    - path: all
      type: a
