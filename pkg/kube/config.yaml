---
# k3s server config file.

write-kubeconfig-mode: "0644"
log: "/persist/kubelog/k3s.log"
# disable agent tunneling, we are on the same network
egress-selector-mode: "disabled"
default-local-storage-path: "/persist/vault/volumes"
etcd-arg:
  - "quota-backend-bytes=8589934592"
  - "auto-compaction-mode=periodic"
  - "auto-compaction-retention=1h"    # was 8h default; 1h suits edge clusters
  - "snapshot-count=5000"             # raft snapshot every 5000 entries (default 100000)
etcd-expose-metrics: true
container-runtime-endpoint: "/run/containerd-user/containerd.sock"
disable-network-policy: true
disable-cloud-controller: true
disable:
  - servicelb
  - traefik
kubelet-arg:
  - "node-status-update-frequency=2s"
  - "cpu-manager-policy=static"
  - "cpu-manager-reconcile-period=5s"
  - "reserved-cpus=0"
kube-controller-arg:
  - "node-monitor-period=10s"
  - "node-monitor-grace-period=40s"
kube-apiserver-arg:
  - "event-ttl=72h"
  - "authentication-token-webhook-config-file=/etc/kube-api-authn-webhook.yaml"
