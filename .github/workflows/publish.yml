---
name: Publish
on:  # yamllint disable-line rule:truthy
  push:
    branches:
      - "master"
      - "[0-9]+.[0-9]+"
      - "[0-9]+.[0-9]+-stable"
    paths-ignore:
      - '**/*.md'
      - '.github/**'
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
      - "[0-9]+.[0-9]+.[0-9]+-lts"
      - "[0-9]+.[0-9]+.[0-9]+-rc[0-9]+"

permissions:
  contents: read

jobs:
  # ════════════════════════════════════════════════════════════════════════
  # Stage 1: Build and push base generic packages for each architecture.
  # Stage 2 EVE jobs pull these from the registry; `make pkgs` only
  # rebuilds any extra HV/platform-specific packages on top.
  # ════════════════════════════════════════════════════════════════════════

  pkgs-amd64:
    if: github.event.repository.full_name == 'lf-edge/eve'
    runs-on: zededa-ubuntu-2204
    steps:
      - name: Starting Report
        run: |
          echo Git Ref: ${{ github.ref }}
          echo GitHub Event: ${{ github.event_name }}
          echo Disk usage
          df -h
          echo Memory
          free -m
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Force fetch annotated tags (workaround)
        run: |
          git fetch --force --tags
      - name: Login to Docker Hub
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2  # v4.0.0
        with:
          username: ${{ secrets.RELEASE_DOCKERHUB_ACCOUNT }}
          password: ${{ secrets.RELEASE_DOCKERHUB_TOKEN }}
      - name: Build and push packages
        run: |
          SUCCESS=
          for i in 1 2 3; do
            echo "Run attempt: $i"
            if make -e V=1 HV=kvm ZARCH=amd64 PLATFORM=generic LINUXKIT_PKG_TARGET=push PRUNE=1 pkgs; then
              SUCCESS=true
              break
            else
              docker system prune -f -a --volumes
            fi
          done
          if [ -z "$SUCCESS" ]; then echo "::error::failed to build and push packages" && exit 1; fi
      - name: Post package report
        run: |
          echo Disk usage
          df -h
          echo Memory
          free -m
          docker system df
          docker system df -v
      - name: Clean
        if: ${{ always() }}
        run: |
          make clean
          docker system prune -f -a --volumes
          rm -rf ~/.linuxkit

  pkgs-arm64:
    if: github.event.repository.full_name == 'lf-edge/eve'
    runs-on: zededa-ubuntu-2204-arm64
    timeout-minutes: 1440
    steps:
      - name: Starting Report
        run: |
          echo Git Ref: ${{ github.ref }}
          echo GitHub Event: ${{ github.event_name }}
          echo Disk usage
          df -h
          echo Memory
          free -m
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Force fetch annotated tags (workaround)
        run: |
          git fetch --force --tags
      - name: Login to Docker Hub
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2  # v4.0.0
        with:
          username: ${{ secrets.RELEASE_DOCKERHUB_ACCOUNT }}
          password: ${{ secrets.RELEASE_DOCKERHUB_TOKEN }}
      - name: Build and push packages
        run: |
          SUCCESS=
          for i in 1 2 3; do
            echo "Run attempt: $i"
            if make -e V=1 HV=kvm ZARCH=arm64 PLATFORM=generic LINUXKIT_PKG_TARGET=push PRUNE=1 pkgs; then
              SUCCESS=true
              break
            else
              docker system prune -f -a --volumes
            fi
          done
          if [ -z "$SUCCESS" ]; then echo "::error::failed to build and push packages" && exit 1; fi
      - name: Post package report
        run: |
          echo Disk usage
          df -h
          echo Memory
          free -m
          docker system df
          docker system df -v
      - name: Clean
        if: ${{ always() }}
        run: |
          make clean
          docker system prune -f -a --volumes
          rm -rf ~/.linuxkit

  # ════════════════════════════════════════════════════════════════════════
  # Stage 2: Build and push EVE images for every variant.
  # Base generic packages are already in the registry from Stage 1.
  # Each job builds any remaining HV/platform-specific packages (a fast
  # delta), pushes them, then builds and pushes the EVE image.
  # ════════════════════════════════════════════════════════════════════════

  eve:
    if: github.event.repository.full_name == 'lf-edge/eve'
    needs: [pkgs-amd64, pkgs-arm64]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 1440
    strategy:
      fail-fast: false
      matrix:
        include:
          # amd64
          - arch: amd64
            hv: kvm
            platform: "generic"
            os: zededa-ubuntu-2204
          - arch: amd64
            hv: xen
            platform: "generic"
            os: zededa-ubuntu-2204
          - arch: amd64
            hv: k
            platform: "generic"
            os: zededa-ubuntu-2204
          # arm64 generic
          - arch: arm64
            hv: kvm
            platform: "generic"
            os: zededa-ubuntu-2204-arm64
          - arch: arm64
            hv: xen
            platform: "generic"
            os: zededa-ubuntu-2204-arm64
          - arch: arm64
            hv: k
            platform: "generic"
            os: zededa-ubuntu-2204-arm64
          # arm64 nvidia
          - arch: arm64
            hv: kvm
            platform: "nvidia-jp5"
            os: zededa-ubuntu-2204-arm64
          - arch: arm64
            hv: kvm
            platform: "nvidia-jp6"
            os: zededa-ubuntu-2204-arm64
          - arch: arm64
            hv: kvm
            platform: "nvidia-jp7"
            os: zededa-ubuntu-2204-arm64
          - arch: arm64
            hv: k
            platform: "nvidia-jp5"
            os: zededa-ubuntu-2204-arm64
          - arch: arm64
            hv: k
            platform: "nvidia-jp6"
            os: zededa-ubuntu-2204-arm64
          - arch: arm64
            hv: k
            platform: "nvidia-jp7"
            os: zededa-ubuntu-2204-arm64
          # riscv64 (cross-build on amd64 runner via qemu)
          - arch: riscv64
            hv: mini
            platform: "generic"
            os: zededa-ubuntu-2204

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install qemu for cross-arch build
        if: matrix.arch == 'riscv64'
        run: |
          APT_INSTALL="sudo apt install -y binfmt-support qemu-user-static"
          $APT_INSTALL || { sudo apt update && $APT_INSTALL ; }
      - name: Build and push remaining packages
        uses: ./.github/actions/run-make
        with:
          command: "V=1 HV=${{ matrix.hv }} ZARCH=${{ matrix.arch }} PLATFORM=${{ matrix.platform }} LINUXKIT_PKG_TARGET=push PRUNE=1 pkgs"
          dockerhub-token: ${{ secrets.RELEASE_DOCKERHUB_TOKEN }}
          dockerhub-account: ${{ secrets.RELEASE_DOCKERHUB_ACCOUNT }}
          clean: false
      - name: Build and push EVE
        uses: ./.github/actions/run-make
        with:
          command: "V=1 HV=${{ matrix.hv }} ZARCH=${{ matrix.arch }} PLATFORM=${{ matrix.platform }} LINUXKIT_PKG_TARGET=push eve"
          dockerhub-token: ${{ secrets.RELEASE_DOCKERHUB_TOKEN }}
          dockerhub-account: ${{ secrets.RELEASE_DOCKERHUB_ACCOUNT }}
          clean: false
      - name: Collect and push SBOM and sources
        uses: ./.github/actions/run-make
        if: matrix.arch != 'riscv64'
        with:
          command: "V=1 HV=${{ matrix.hv }} ZARCH=${{ matrix.arch }} PLATFORM=${{ matrix.platform }} LINUXKIT_PKG_TARGET=push sbom collected_sources compare_sbom_collected_sources publish_sources"
          dockerhub-token: ${{ secrets.RELEASE_DOCKERHUB_TOKEN }}
          dockerhub-account: ${{ secrets.RELEASE_DOCKERHUB_ACCOUNT }}
          clean: false
      - name: Clean
        if: ${{ always() }}
        run: |
          make clean
          docker system prune -f -a --volumes
          rm -rf ~/.linuxkit

  # ════════════════════════════════════════════════════════════════════════
  # Stage 3: Multi-arch manifests and release assets.
  # Runs after all EVE jobs so every package image has been pushed.
  # ════════════════════════════════════════════════════════════════════════

  manifest:
    if: github.event.repository.full_name == 'lf-edge/eve'
    needs: eve
    runs-on: zededa-ubuntu-2204
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: ./.github/actions/run-make
        with:
          command: "V=1 LINUXKIT_PKG_TARGET=manifest pkgs"
          dockerhub-token: ${{ secrets.RELEASE_DOCKERHUB_TOKEN }}
          dockerhub-account: ${{ secrets.RELEASE_DOCKERHUB_ACCOUNT }}

  coverage:
    if: github.event.repository.full_name == 'lf-edge/eve'
    runs-on: zededa-ubuntu-2204
    steps:
      - name: Clear repository
        run: |
          sudo rm -fr "$GITHUB_WORKSPACE" && mkdir "$GITHUB_WORKSPACE"
          rm -fr ~/.linuxkit
          docker system prune --all --force --volumes
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Login to Docker Hub
        run: |
          docker login
      - name: Test
        run: |
          make pkg/bpftrace
          make ZARCH=arm64 pkg/bpftrace
          make test
      - name: Report test results as Annotations
        if: ${{ always() }}
        uses: guyarb/golang-test-annoations@96fc379b171c49932041d6c789e73331a7bdeec1  # v0.9.0
        with:
          test-results: dist/amd64/results.json
      - name: Store raw test results
        if: ${{ always() }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: 'test-report'
          path: ${{ github.workspace }}/dist
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2  # v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
      - name: Clean
        if: ${{ always() }}
        run: |
          make clean
          docker system prune -f -a --volumes
          rm -rf ~/.linuxkit

  trigger_assets:
    if: ${{ (startsWith(github.ref, 'refs/tags/')) && (github.event.repository.full_name == 'lf-edge/eve') }}
    needs: [manifest, eve]
    uses: lf-edge/eve/.github/workflows/assets.yml@master
    secrets:
      DOCKERHUB_PULL_TOKEN: ${{ secrets.DOCKERHUB_PULL_TOKEN }}
      DOCKERHUB_PULL_USER: ${{ secrets.DOCKERHUB_PULL_USER }}
    with:
      tag_ref: ${{ github.ref_name }}
